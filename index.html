<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Favicons for browsers -->
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  
  <!-- Apple Touch Icon (iOS Home Screen) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  
  <!-- Web App Manifest (Android Chrome) -->
  <link rel="manifest" href="icons/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Golf Leaderboard & Comparison Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Full-Width Top Navigation Bar -->
  <nav class="navbar">
    <button id="navCompareBtn" class="nav-tab active">Compare Users</button>
    <button id="navLeaderboardBtn" class="nav-tab">Custom Leaderboard</button>
  </nav>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- Custom Solutions Download Modal (Prevents Popup Blocking) -->
  <div id="solutionsModal" class="loading-overlay hidden" style="background: rgba(0,0,0,0.75); z-index: 1000;">
    <div class="card" style="max-width: 420px; width: 90%; text-align: center; display: flex; flex-direction: column; gap: 1rem;">
      <h3 style="margin: 0; color: var(--accent);">Download solutions.json</h3>
      <p style="margin: 0; color: var(--text-dim, #ccc); font-size: 0.95rem; line-height: 1.4;">
        How would you like to retrieve the solutions data?
      </p>
      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
        <button id="modalGithubBtn" class="btn-submit">🌐 Visit GitHub History Repo</button>
        <button id="modalCurlBtn" class="btn-secondary">📋 Copy curl Command</button>
        <button id="modalCloseBtn" class="btn-secondary" style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">Cancel</button>
      </div>
    </div>
  </div>

  <div class="container">
    <h1>Code Golf Toolkit</h1>

    <!-- PAGE 1: User Comparison View -->
    <div id="comparePage">
      <div class="card">
        <h2>Compare Golfers</h2>
        <div class="grid-form">
          <div class="form-group">
            <label for="submissionsFile">Submissions JSON (solutions.json) *</label>
            <input type="file" id="submissionsFile" accept=".json">
          </div>

          <div class="form-group">
            <label for="user1Input">Username 1 (Left) *</label>
            <input type="text" id="user1Input" placeholder="e.g. scpchicken">
          </div>

          <div class="form-group">
            <label for="user2Input">Username 2 (Right, Optional)</label>
            <input type="text" id="user2Input" placeholder="e.g. JRaspass">
          </div>

          <div class="form-group">
            <label for="scoringSelect">Scoring Mode</label>
            <select id="scoringSelect">
              <option value="bytes">Bytes</option>
              <option value="chars">Chars</option>
            </select>
          </div>
          <div class="form-group">
            <label for="compareScoringFormulaSelect">Scoring Formula</label>
            <select id="compareScoringFormulaSelect">
              <option value="standard">Standard (750 Min): ((N + 2) / (N + 3)) * S + (1 / (N + 3)) * Sa Sb</option>
              <option value="alt">Alternative (900 Min): ((N + 8) / (N + 9)) * S + (1 / (N + 9)) * Sa Sb</option>
              <option value="min950">High (950 Min): ((N + 18) / (N + 19)) * S + (1 / (N + 19)) * Sa Sb</option>
              <option value="min999">Ultra (999 Min): ((N + 998) / (N + 999)) * S + (1 / (N + 999)) * Sa Sb</option>
              <option value="min1000">Max (1000 Min): Flat 1000 Base (No Solver Penalty)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="sortOrderInput">Initial Sort Order</label>
            <select id="sortOrderInput">
              <option value="u1-desc">User 1 Score (High to Low)</option>
              <option value="u2-desc">User 2 Score (High to Low)</option>
              <option value="diff-desc">Score Diff (U1 - U2) (High to Low)</option>
              <option value="diff-asc">Score Diff (U2 - U1) (Low to High)</option>
              <option value="alpha-asc">Hole Name (A-Z)</option>
              <option value="alpha-desc">Hole Name (Z-A)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="langFilterInput">Lang Filter (Optional)</label>
            <input type="text" id="langFilterInput" placeholder="e.g. python">
          </div>

          <div class="form-group">
            <label for="holesFile">Holes JSON (Auto-fetches if empty)</label>
            <input type="file" id="holesFile" accept=".json">
          </div>

          <div class="form-group">
            <label for="langsFile">Langs JSON (Auto-fetches if empty)</label>
            <input type="file" id="langsFile" accept=".json">
          </div>

          <div class="form-group">
            <label>&nbsp;</label>
            <div class="checkbox-wrapper">
              <input type="checkbox" id="experimentalCheck">
              <label for="experimentalCheck" class="checkbox-label">Include Experimental Holes & Langs</label>
            </div>
          </div>
        </div>

        <!-- Button Toolbar -->
        <div class="button-group">
          <button class="btn-submit" id="goBtn">GO!</button>
          <button class="btn-secondary" id="dlSolutionsBtn">📥 Download solutions.json</button>
          <button class="btn-secondary" id="dlHolesBtn">📥 Download holes.json</button>
          <button class="btn-secondary" id="dlLangsBtn">📥 Download langs.json</button>
          <button class="btn-secondary hidden" id="dlResultsBtn">📥 Export Results JSON</button>
        </div>
      </div>

      <!-- Results Section -->
      <div id="resultsCard" class="card hidden" style="margin-top: 1.5rem;">
        <div class="stats-row" id="statsContainer"></div>

        <div class="controls-bar">
          <input type="text" id="tableSearch" class="search-bar" placeholder="Filter holes...">
          <select id="activeSortSelect" class="sort-select">
            <option value="u1-desc">User 1 Score (High to Low)</option>
            <option value="u2-desc">User 2 Score (High to Low)</option>
            <option value="diff-desc">Score Diff (U1 - U2) (High to Low)</option>
            <option value="diff-asc">Score Diff (U2 - U1) (Low to High)</option>
            <option value="alpha-asc">Hole Name (A-Z)</option>
            <option value="alpha-desc">Hole Name (Z-A)</option>
          </select>
        </div>

        <div style="overflow-x: auto;">
          <table id="resultsTable">
            <thead id="tableHead"></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PAGE 2: Custom Leaderboard View -->
    <div id="leaderboardPage" class="hidden">
      <div class="card">
        <h2>Custom Leaderboard (Bytes)</h2>
        <p class="subtitle" style="margin-bottom: 15px; color: var(--text-dim);">
          Enter comma-separated usernames to generate a custom ranking using <strong>bytes scoring</strong>.
        </p>

        <div class="grid-form">
          <div class="form-group" style="grid-column: 1 / -1;">
            <label 
              for="leaderboardUsersInput" 
              id="leaderboardUsersLabel" 
              style="cursor: pointer; user-select: none;" 
              title="Click to autofill default golfers"
            >
              Golfers to Rank (Comma-separated) <span style="font-size: 0.8em; opacity: 0.75;">✨ Click here to autofill</span>
            </label>
            <input 
              type="text" 
              id="leaderboardUsersInput" 
              placeholder="e.g. scpchicken, JRaspass, DialFrost"
            >
          </div>

          <!-- Formula Switch Option -->
          <div class="form-group">
            <label for="scoringFormulaSelect">Scoring Formula</label>
            <select id="scoringFormulaSelect">
              <option value="standard">Standard (750 Min): ((N + 2) / (N + 3)) * S + (1 / (N + 3)) * Sa Sb</option>
              <option value="alt">Alternative (900 Min): ((N + 8) / (N + 9)) * S + (1 / (N + 9)) * Sa Sb</option>
              <option value="min950">High (950 Min): ((N + 18) / (N + 19)) * S + (1 / (N + 19)) * Sa Sb</option>
              <option value="min999">Ultra (999 Min): ((N + 998) / (N + 999)) * S + (1 / (N + 999)) * Sa Sb</option>
              <option value="min1000">Max (1000 Min): Flat 1000 Base (No Solver Penalty)</option>
            </select>
          </div>
        </div>

        <div class="button-group" style="margin-top: 1.5rem;">
          <button class="btn-submit" id="lbGoBtn">Generate Leaderboard</button>
        </div>
      </div>

      <!-- Leaderboard Results Card -->
      <div id="lbResultsCard" class="card hidden" style="margin-top: 1.5rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 10px;">
          <h3 style="margin: 0; color: var(--accent);">Leaderboard Standings</h3>
          <button id="exportLbTxtBtn" class="btn-secondary">📥 Export as TXT Table</button>
        </div>

        <div style="overflow-x: auto;">
          <table id="lbResultsTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Holes</th>
                <th>Points</th>
                <th>Bytes</th>
              </tr>
            </thead>
            <tbody id="lbResultsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
